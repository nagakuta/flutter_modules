name: analytics_service
description: A new Flutter package project.
version: 0.1.0+2
homepage: https://github.com/nagakuta
publish_to: https://dart.cloudsmith.io/nagakuta_flutter/modules/

environment:
  sdk: ">=2.17.5 <3.0.0"
  flutter: ">=1.17.0"

dependencies:
  # Crashlytics Service
  crashlytics_service:
    hosted:
      url: https://dart.cloudsmith.io/nagakuta_flutter/modules/
      name: crashlytics_service
    version: ^0.1.1+2

  # Firebase Analytics
  firebase_analytics: ^9.3.0

  # Firebase Service
  firebase_service:
    hosted:
      url: https://dart.cloudsmith.io/nagakuta_flutter/modules/
      name: firebase_service
    version: ^0.1.0+2

  flutter:
    sdk: flutter

  # Logging Service
  logging_service:
    hosted:
      url: https://dart.cloudsmith.io/nagakuta_flutter/modules/
      name: logging_service
    version: ^0.1.0+2

  # Mockito
  mockito: ^5.3.0

  # Package Info Service
  package_info_service:
    hosted:
      url: https://dart.cloudsmith.io/nagakuta_flutter/modules/
      name: package_info_service
    version: ^0.1.0+2

  # Riverpod
  riverpod: ^1.0.3

dev_dependencies:
  # Build Runner
  build_runner: ^2.2.0

  flutter_lints: ^2.0.1

  flutter_test:
    sdk: flutter

