name: auth_service
description: A new Flutter package project.
version: 0.1.0
homepage: https://github.com/nagakuta
publish_to: https://dart.cloudsmith.io/nagakuta_flutter/modules/

environment:
  sdk: ">=2.17.1 <3.0.0"
  flutter: ">=2.5.0"

dependencies:
  # Analytics Service
  analytics_service:
    hosted:
      url: https://dart.cloudsmith.io/nagakuta_flutter/modules/
      name: analytics_service
    version: ^0.1.0

  # Crashlytics Service
  crashlytics_service:
    hosted:
      url: https://dart.cloudsmith.io/nagakuta_flutter/modules/
      name: crashlytics_service
    version: ^0.1.0+1

  # Crypto
  crypto: ^3.0.2

  # Firebase Auth
  firebase_auth: ^3.3.19

  # Firebase Service
  firebase_service:
    hosted:
      url: https://dart.cloudsmith.io/nagakuta_flutter/modules/
      name: firebase_service
    version: ^0.1.0

  flutter:
    sdk: flutter

  # Flutter Facebook Auth
  flutter_facebook_auth: ^4.3.4

  flutter_web_plugins:
    sdk: flutter

  # Freezed Annotation
  freezed_annotation: ^2.0.3

  # Google Sign In
  google_sign_in: ^5.3.3

  # Mockito
  mockito: ^5.2.0

  plugin_platform_interface: ^2.1.2

  # Riverpod
  riverpod: ^1.0.3

  # Sign In With Apple
  sign_in_with_apple: ^4.0.0

  # State Notifier
  state_notifier: ^0.7.2+1

  # Twitter Login
  twitter_login: ^4.2.3

dev_dependencies:
  # Build Runner
  build_runner: ^2.1.11

  flutter_lints: ^2.0.1

  flutter_test:
    sdk: flutter

  # Freezed
  freezed: ^2.0.3+1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # This section identifies this Flutter project as a plugin project.
  # The 'pluginClass' specifies the class (in Java, Kotlin, Swift, Objective-C, etc.)
  # which should be registered in the plugin registry. This is required for
  # using method channels.
  # The Android 'package' specifies package in which the registered class is.
  # This is required for using method channels on Android.
  # The 'ffiPlugin' specifies that native code should be built and bundled.
  # This is required for using `dart:ffi`.
  # All these are used by the tooling to maintain consistency when
  # adding or updating assets for this project.
  plugin:
    platforms:
      android:
        package: com.github.nagakuta.auth_service
        pluginClass: AuthServicePlugin
      ios:
        pluginClass: AuthServicePlugin
      linux:
        pluginClass: AuthServicePlugin
      macos:
        pluginClass: AuthServicePlugin
      windows:
        pluginClass: AuthServicePluginCApi
      web:
        pluginClass: AuthServiceWeb
        fileName: auth_service_web.dart

  # To add assets to your plugin package, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/assets-and-images/#from-packages
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # To add custom fonts to your plugin package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts in packages, see
  # https://flutter.dev/custom-fonts/#from-packages
